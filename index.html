<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <div class="quiz-container">
            <h1 class="quiz-title">Quiz Application</h1>
            
            <!-- Quiz Card (shown during quiz) -->
            <div class="quiz-card">
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 20%"></div>
                </div>
                
                <div class="question-header">
                    <span class="question-count">Question 1/5</span>
                    <span class="score-display">Score: 0</span>
                </div>

                <h2 class="question-text">What is the capital of France?</h2>

                <div class="answers-container">
                    <button class="answer-btn">
                        <span class="option-letter">A.</span>
                        London
                    </button>
                    <button class="answer-btn">
                        <span class="option-letter">B.</span>
                        Berlin
                    </button>
                    <button class="answer-btn">
                        <span class="option-letter">C.</span>
                        Paris
                    </button>
                    <button class="answer-btn">
                        <span class="option-letter">D.</span>
                        Madrid
                    </button>
                </div>
            </div>

            <!-- Result Card (shown at the end) -->
            <div class="result-card" style="display: none;">
                <h2 class="result-title">Quiz Completed!</h2>
                
                <div class="score-circle">
                    <div class="score-circle-inner">
                        <span class="score-number">4</span>
                        <span class="score-total">/5</span>
                    </div>
                </div>

                <p class="result-message">Excellent! 🎉</p>
                
                <div class="result-details">
                    <p>Your Score: <strong>80%</strong></p>
                    <p>Correct Answers: 4</p>
                    <p>Incorrect Answers: 1</p>
                </div>

                <button class="restart-btn">Restart Quiz</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
